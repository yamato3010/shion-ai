# shion-ai 全体設定
# ${VAR} は .env / 環境変数から展開される(docs/08_security.md)

llm:
  providers:
    # OpenAI互換の chat/completions エンドポイントを持つプロバイダを定義する。
    # api_key が空のプロバイダは「未設定」として扱われ、フォールバックに移る。
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: https://api.openai.com/v1
    gemini:
      # Gemini は OpenAI 互換エンドポイントを利用
      api_key: ${GEMINI_API_KEY}
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
    anthropic:
      # Claude はネイティブAPI(type: anthropic は名前から自動判定される)
      api_key: ${ANTHROPIC_API_KEY}
    ollama:
      api_key: ollama # ダミー値(Ollamaはキー不要)
      base_url: http://localhost:11434/v1

  # 用途別モデル割当。"provider/model" 形式(docs/04_llm_provider.md)
  # 例: gemini/gemini-2.0-flash, ollama/qwen3:8b
  models:
    chat: ollama/nadeshiko:v1
    # chat: openai/gpt-4o-mini
    # 記憶抽出(裏方処理。安いモデルやローカルLLM推奨。未指定なら chat と同じ)
    memory: ollama/nadeshiko:v1
    # ニュース要約などの大量・低単価用途(未指定なら chat と同じ)
    summarize: ollama/nadeshiko:v1
    # 長期記憶の類似検索用の埋め込みモデル。
    # 未設定・キー無しの場合はキーワード検索にフォールバックする。
    # ローカルで完結させるなら: ollama/nomic-embed-text(`ollama pull nomic-embed-text`)
    embedding: openai/text-embedding-3-small

  # chat モデルが使えないときのフォールバック順。
  # mock/echo は APIキー無しで動作確認するための組み込みモック。
  fallback:
    - mock/echo

  # コスト概算の単価表の上書き・追加(USD / 100万トークン)。主要モデルは組み込み済み。
  # pricing:
  #   openai/gpt-4o-mini: { in: 0.15, out: 0.60 }

chat:
  # 応答生成時にコンテキストへ含める直近メッセージ数
  history_limit: 30

# 音声合成(VOICEVOX。https://voicevox.hiroshiba.jp/ のエンジンをローカルで起動しておく)
voice:
  enabled: true
  engine_url: http://localhost:50021
  # 話者ID。エンジン起動中に http://localhost:50021/speakers で一覧を確認できる。
  # 例: 46=小夜/SAYO, 2=四国めたん, 3=ずんだもん, 14=冥鳴ひまり
  speaker: 46

# Discord Bot(.env に DISCORD_BOT_TOKEN を設定すると起動する)
discord:
  # あなたのDiscordユーザーID(開発者モードでプロフィール右クリック→IDコピー)。
  # 複数人を許可する場合はカンマ区切り(例: DISCORD_OWNER_ID=123,456)。
  # 未設定のままDMすると、設定すべきIDをBotが教えてくれる。
  owner_id: ${DISCORD_OWNER_ID}
  # スラッシュコマンドを即時反映したいサーバーのID(任意)。
  # 未設定はグローバル登録になり、反映に最大1時間かかる。
  command_guild_id: ${DISCORD_GUILD_ID}

# 通知ルーティング(docs/03 §4)
# プラグインは論理チャネルへ通知を発行し、配送先はここで決める。
# 配送先: web(Web UIのトースト)/ discord_dm(オーナーへのDM。Bot稼働時のみ)
notifications:
  routes:
    daily: [web, discord_dm]
    important: [web, discord_dm]
    default: [web]

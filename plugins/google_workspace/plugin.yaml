name: google_workspace
display_name: "Google連携"
version: 1.0.0
description: "Gmail・Googleカレンダー連携。予定/メールの照会ツールと、朝ブリーフィング・重要メール・予定リマインドの通知"
author: yamato
api_version: 1
config_schema:
  briefing_time:
    type: string
    default: "07:30"
    description: "朝ブリーフィングの時刻"
  briefing_enabled:
    type: boolean
    default: true
    description: "朝ブリーフィング(今日の予定+未読メール)を通知する"
  mail_watch_enabled:
    type: boolean
    default: true
    description: "重要メールの即時通知(5分間隔ポーリング)"
  important_senders:
    type: list
    default: []
    description: "常に重要扱いする送信元(メールアドレスまたはドメインの一部)"
  important_keywords:
    type: list
    default: ["緊急", "重要", "至急", "請求", "支払", "invoice"]
    description: "件名にこの語が含まれたら重要メールとして通知"
  event_reminder_enabled:
    type: boolean
    default: true
    description: "30分以内に始まる予定のリマインド(15分間隔チェック)"
permissions:
  - network
  - google_oauth
